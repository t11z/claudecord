services:
  bot:
    build: .
    container_name: claudecord
    restart: unless-stopped
    # The dashboard is only reachable from the host machine itself. To expose
    # it further, change the mapping AND set DASHBOARD_PASSWORD (the bot
    # refuses an unprotected public bind).
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - path: .env
        required: false
    volumes:
      # SQLite database, secrets.json, per-thread workspaces
      - claudecord-data:/data
      # Claude Code session storage — REQUIRED for conversations to survive
      # container restarts.
      - claudecord-claude:/home/bot/.claude

volumes:
  claudecord-data:
  claudecord-claude:
